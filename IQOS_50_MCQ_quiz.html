<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IQOS Mastery Quiz • Heat-Not-Burn Certification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9f0f5 0%, #dae4ed 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1.8rem 1rem;
            min-height: 100vh;
        }

        /* main card */
        .quiz-wrapper {
            max-width: 850px;
            margin: 0 auto;
        }

        .quiz-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0,0,0,0.02);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .quiz-inner {
            padding: 1.8rem 2rem 2rem;
        }

        /* progress & header */
        .progress-section {
            margin-bottom: 1.6rem;
        }
        .progress-bar {
            height: 8px;
            background: #e2edf2;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1D9E75, #2bbd8a);
            border-radius: 20px;
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            width: 0%;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 0.8rem;
            flex-wrap: wrap;
            gap: 0.6rem;
        }
        .q-counter {
            background: #eef3fa;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e4b6e;
            letter-spacing: 0.3px;
        }
        .score-indicator {
            background: #e0f2e9;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #1b6e4f;
        }

        /* question area */
        .q-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .q-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            color: #5b6e8c;
            text-transform: uppercase;
        }
        .tricky-badge {
            background: #fff0db;
            color: #c46f0a;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.4;
            color: #0a2540;
            margin: 0.75rem 0 1.5rem 0;
            background: #fbfeff;
            padding: 0.2rem 0;
        }

        /* options grid */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .option-btn {
            background: #ffffff;
            border: 1.5px solid #e2edf2;
            border-radius: 20px;
            padding: 0.9rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            color: #1f3b4c;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(2px);
        }
        .option-prefix {
            font-weight: 800;
            background: #f0f4f9;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            color: #2c5a7a;
        }
        .option-btn:hover:not(:disabled) {
            background: #f9fdfe;
            border-color: #bdd4e2;
            transform: translateX(4px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .option-correct {
            background: #e6f4ec;
            border-color: #2c8c5a;
            color: #1b5e3f;
        }
        .option-correct .option-prefix {
            background: #cbe6da;
            color: #1b6e4f;
        }
        .option-wrong {
            background: #ffeae6;
            border-color: #cd5a3c;
            color: #aa3e1c;
        }
        .option-wrong .option-prefix {
            background: #fadbd4;
            color: #bc4a2a;
        }
        .option-btn:disabled {
            cursor: default;
            opacity: 0.9;
        }

        /* explanation bubble */
        .explanation-card {
            background: #f6fafd;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            line-height: 1.5;
            border-left: 5px solid #7f8fa4;
            transition: all 0.2s;
        }
        .explanation-correct {
            background: #eafaf2;
            border-left-color: #2d9c6b;
            color: #1a4f37;
        }
        .explanation-wrong {
            background: #fff2ef;
            border-left-color: #e26d4a;
            color: #832e12;
        }

        /* navigation */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .btn {
            padding: 0.6rem 1.6rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            background: white;
            cursor: pointer;
            transition: 0.2s;
            color: #2c5a7a;
            border: 1px solid #cbdde6;
        }
        .btn-primary {
            background: #1D9E75;
            border: none;
            color: white;
            box-shadow: 0 2px 6px rgba(29,158,117,0.2);
        }
        .btn-primary:hover:not(:disabled) {
            background: #0f7e5b;
            transform: scale(0.97);
        }
        .btn-secondary:hover {
            background: #e9f0f5;
            border-color: #b0cbdc;
        }
        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* score screen */
        .score-screen {
            text-align: center;
            padding: 1rem 0.5rem;
        }
        .score-circle {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1D9E75, #118a62);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0.5rem 0;
        }
        .badge-pass {
            background: #dff3e9;
            color: #196f4b;
            padding: 0.4rem 1rem;
            border-radius: 80px;
            display: inline-block;
            font-weight: 700;
        }
        .breakdown-stats {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #f8fafd;
            border-radius: 28px;
            padding: 1rem 1.4rem;
            min-width: 110px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid #e4edf2;
        }
        /* modal review */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            background: white;
            max-width: 720px;
            width: 90%;
            max-height: 85vh;
            border-radius: 2rem;
            overflow-y: auto;
            padding: 1.4rem;
        }
        .mistake-entry {
            background: #fef7f0;
            border-left: 4px solid #e67e22;
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 1.2rem;
        }
        @media (max-width: 550px) {
            .quiz-inner { padding: 1.2rem; }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="quiz-card">
        <div class="quiz-inner" id="quizInner">
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
                <div class="stats-bar">
                    <span class="q-counter" id="qcDisplay">Question 1 of 50</span>
                    <span class="score-indicator" id="scoreDisplay">⭐ Score: 0</span>
                </div>
            </div>
            <div id="dynamicContent"></div>
            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prevBtn">← Previous</button>
                <button class="btn btn-primary" id="nextBtn">Next →</button>
            </div>
        </div>
    </div>
</div>

<div id="finalScreen" class="score-screen" style="display: none;">
    <div style="font-size: 1.8rem; font-weight: 700;">🏁 Quiz Completed</div>
    <div class="score-circle" id="finalScoreSpan"></div>
    <div id="passMessage" class="badge-pass" style="margin-bottom: 1rem;"></div>
    <div class="breakdown-stats">
        <div class="stat-card"><div id="finalCorrect" style="font-size: 2rem; font-weight: 800; color:#1D9E75;">0</div><div>Correct</div></div>
        <div class="stat-card"><div id="finalWrong" style="font-size: 2rem; font-weight: 800; color:#c2410c;">0</div><div>Wrong</div></div>
        <div class="stat-card"><div id="finalTricky" style="font-size: 2rem; font-weight: 800; color:#b45309;">0</div><div>Tricky ✓</div></div>
    </div>
    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
        <button class="btn btn-primary" id="restartQuizBtn">⟳ Restart Quiz</button>
        <button class="btn btn-secondary" id="reviewMistakesBtnFinal">📖 Review Mistakes</button>
    </div>
</div>

<div id="reviewModal" class="modal">
    <div class="modal-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3 style="font-weight: 700;">🔍 Mistake analysis</h3>
            <button id="closeModalBtn" style="background: none; border: none; font-size: 1.8rem; cursor: pointer;">&times;</button>
        </div>
        <div id="mistakesList"></div>
        <button class="btn btn-secondary" id="modalCloseFooter" style="margin-top: 1rem; width: 100%;">Close</button>
    </div>
</div>

<script>
    // ---------- ORIGINAL QUESTION BANK (raw, will shuffle options) ----------
    const rawQuestions = [
        {q:"What does NCA stand for?",opts:["Non-Chemical Alternative","Non-Combusted Alternative","Nicotine Controlled Alternative","Non-Cigarette Alternative"],ans:1,exp:"NCA = Non-Combusted Alternative — the category IQOS belongs to, meaning tobacco is heated without combustion."},
        {q:"What does HNB stand for?",opts:["High Nicotine Base","Heated Nicotine Blends","Heat Not Burn","Hybrid Nicotine Blend"],ans:2,exp:"HNB = Heat Not Burn. This is the core technology behind IQOS."},
        {q:"At approximately what temperature does a regular cigarette burn?",opts:["350°C","600°C","800°C","1000°C"],ans:2,exp:"Regular cigarettes combust at around 800°C. IQOS heats at a much lower ~350°C."},
        {q:"At approximately what temperature does IQOS heat tobacco?",opts:["150°C","250°C","350°C","500°C"],ans:2,exp:"IQOS heats tobacco at ~350°C — well below combustion temperature."},
        {q:"How many puffs or minutes does one TEREA stick provide?",opts:["10 puffs or 5 min","14 puffs or 6 min","20 puffs or 7 min","12 puffs or 6 min"],ans:1,exp:"One TEREA stick lasts up to 14 puffs or 6 minutes per session."},
        {q:"By how much does IQOS reduce harmful chemicals compared to cigarettes?",opts:["50%","75%","90%","95%"],ans:3,exp:"IQOS produces 95% fewer harmful chemicals than regular cigarettes."},
        {q:"⚠️ TRICKY: Which of the following is NOT a benefit of IQOS compared to regular cigarettes?",opts:["No Smoke","No Ash","No Nicotine","No Smell"],ans:2,exp:"TRICKY — IQOS still contains nicotine! It produces no smoke, ash, or significant smell, but nicotine is still present in the aerosol.",tricky:true},
        {q:"In the TEREA classic tobacco range, which flavor is the MOST intense?",opts:["Amber","Sienna","Russet","Khaki"],ans:2,exp:"Russet is the most intense classic tobacco flavor in the TEREA range."},
        {q:"Which TEREA classic tobacco flavor has the LEAST intensity?",opts:["Silver","Amber","Rigan","Khaki"],ans:2,exp:"Rigan is the least intense in the classic tobacco range (Russet → Khaki → Sienna → Amber → Silver → Rigan)."},
        {q:"How many TEREA flavors are officially available in Egypt?",opts:["9","10","12","14"],ans:2,exp:"Egypt has 12 TEREA flavors: Russet, Khaki, Sienna, Amber, Silver, Rigan, Turquoise, Purple Wave, Summer Wave, Sun Pearl, Oasis Pearl, and Arbor Pearl."},
        {q:"Which TEREA flavor features a bold peppermint and deep menthol cooling?",opts:["Turquoise","Blue","Silver","Purple Wave"],ans:1,exp:"TEREA Blue is the boldest menthol option with intense peppermint and deep menthol cooling."},
        {q:"TEREA Turquoise belongs to which category?",opts:["Classic Tobacco","Menthol","Aromatic Fruit","Pearl"],ans:1,exp:"TEREA Turquoise is a mild menthol with citrus notes — classified under the Menthol range."},
        {q:"Which TEREA variants contain a crushable flavor capsule (pearl)?",opts:["Purple Wave, Summer Wave, Turquoise","Sun Pearl, Oasis Pearl, Arbor Pearl","Silver, Blue, Russet","Amber, Sienna, Khaki"],ans:1,exp:"The Pearl variants (Sun Pearl, Oasis Pearl, Arbor Pearl) contain a crushable pearl that releases an intense flavor burst when squeezed."},
        {q:"⚠️ TRICKY: TEREA Blue is classified as which category?",opts:["Classic Tobacco (boldest)","Menthol","Aromatic","Pearl"],ans:1,exp:"TRICKY — Blue appears near the classic range on the whiteboard but it is actually a Menthol flavor (bold peppermint/menthol blend), NOT classic tobacco.",tricky:true},
        {q:"In the TEREA intensity order (highest→lowest), what comes AFTER Amber?",opts:["Sienna","Khaki","Silver","Rigan"],ans:2,exp:"The order is: Russet → Khaki → Sienna → Amber → Silver → Rigan. So Silver comes after Amber."},
        {q:"Which TEREA Pearl flavor features tropical fruits like raspberry, mango, lychee, and coconut?",opts:["Sun Pearl","Arbor Pearl","Oasis Pearl","Summer Wave"],ans:2,exp:"TEREA Oasis Pearl has a tropical blend of raspberry, mango, lychee, peach, and coconut."},
        {q:"What heating technology does IQOS ILUMA use?",opts:["Blade heating","SmartCore Induction System","Convection heating","Laser heating"],ans:1,exp:"IQOS ILUMA uses the SmartCore Induction System™ — it heats the TEREA stick from within using induction rather than a blade."},
        {q:"What material is the heating element inside a TEREA stick made of?",opts:["Copper","Titanium","Stainless Steel","Aluminum"],ans:2,exp:"The heating element inside every TEREA stick is coated with stainless steel."},
        {q:"⚠️ TRICKY: Can TEREA sticks be used with IQOS Originals (blade-based) devices?",opts:["Yes, they're universal","No — TEREA is exclusively for ILUMA","Yes, but only IQOS 3 DUO","Only with an adapter"],ans:1,exp:"TRICKY — TEREA sticks are EXCLUSIVELY for IQOS ILUMA. Using them with older blade devices can cause damage.",tricky:true},
        {q:"What is the main maintenance advantage of IQOS ILUMA over older IQOS models?",opts:["Larger battery","Bladeless design — no cleaning required","Faster charging","More puffs per session"],ans:1,exp:"ILUMA's bladeless SmartCore Induction design means no blade to clean and no tobacco residue in the holder."},
        {q:"What does the Cooling Plug (Cellulose) do in a TEREA stick?",opts:["Heats the tobacco","Cools the aerosol before inhalation","Filters nicotine","Adds flavor"],ans:1,exp:"The cooling plug (made of cellulose) cools down the hot aerosol before it reaches your mouth for a smoother experience."},
        {q:"Which component of the TEREA stick prevents tobacco residue from entering the device?",opts:["Cooling plug","Filter","Sealed closed tip","Air flow chamber"],ans:2,exp:"TEREA sticks are sealed on both sides — this prevents tobacco crumbs and residue from contaminating the holder."},
        {q:"Which IQOS ILUMA i feature allows the holder to be used up to 3 times before recharging?",opts:["Flex Puff","Flex Battery","Up to 3 uses","Pause Mode"],ans:2,exp:"The ILUMA i supports up to 3 consecutive uses — a direct upgrade from the original ILUMA's 2 uses."},
        {q:"Which IQOS ILUMA i device has a touchscreen?",opts:["ILUMA i One","ILUMA i","ILUMA i Prime","All three"],ans:1,exp:"The IQOS ILUMA i (standard) is the device with a touchscreen display for settings and status."},
        {q:"⚠️ TRICKY: Which feature does ILUMA i One have that the original ILUMA One does NOT?",opts:["LED light","Auto Start","Bluetooth","Magnetic Lock"],ans:1,exp:"TRICKY — The original ILUMA One only had Auto Stop. The ILUMA i One adds Auto Start (as well as keeping Auto Stop and Flex Puff).",tricky:true},
        {q:"What unique modes does the ILUMA i Prime offer for different usage preferences?",opts:["Flex Puff only","Pause Mode and Flex Battery","ECO mode and Single Use","Performance and Pause"],ans:2,exp:"The ILUMA i Prime features ECO mode and Single Use mode, in addition to the standard Flex Puff found on other i-series devices."},
        {q:"⚠️ TRICKY: What is the pocket charger charge time for the original IQOS ILUMA?",opts:["90 minutes","135 minutes","120 minutes","75 minutes"],ans:1,exp:"TRICKY — The ILUMA One is 90 mins, but the IQOS ILUMA and ILUMA Prime both take 135 minutes to charge the pocket charger.",tricky:true},
        {q:"How many sessions does the IQOS ILUMA holder provide when FULLY charged?",opts:["1 use","2 uses","10 uses","20 uses"],ans:1,exp:"The ILUMA holder supports 2 uses per full charge (1 use takes 1min50s, 2 uses take 5min15s to charge)."},
        {q:"How does the IQOS ILUMA One differ from the regular IQOS ILUMA?",opts:["It uses HEETS sticks","It's a single-unit device — 20 uses with no separate pocket charger","It doesn't have Bluetooth","It has a touchscreen"],ans:1,exp:"The ILUMA One is an all-in-one device. When fully charged, it gives 20 uses with no separate pocket charger needed."},
        {q:"⚠️ TRICKY: Which ILUMA device does NOT have a Magnetic Lock?",opts:["IQOS ILUMA","ILUMA Prime","ILUMA One","They all have it"],ans:2,exp:"TRICKY — The ILUMA One does NOT have a magnetic lock (it slides open like a lid). Both ILUMA and ILUMA Prime have magnetic locks.",tricky:true},
        {q:"What is the opening mechanism of the IQOS ILUMA Prime?",opts:["Slide the lid","Side Door Mechanism","Wrap design","Soft Latch"],ans:2,exp:"The ILUMA Prime uses a distinctive wrap design — 'just remember the wrap design' as noted in your training materials."},
        {q:"What color is exclusive to the ILUMA Prime and NOT shared with ILUMA or ILUMA One?",opts:["Moss Green","Sunset Red","Obsidian Black / Gold Khaki","Azure Blue"],ans:2,exp:"The original ILUMA Prime comes in Gold Khaki, Jade Green, Obsidian Black, and Bronze Taupe — none of which appear on ILUMA One or ILUMA."},
        {q:"How does the IQOS Originals Duo differ from the Originals One in charger type?",opts:["Both use Type C to USB","Originals One uses Type C-USB; Duo uses Type C–Type C","Both use Micro USB","Originals One uses Type C–Type C"],ans:1,exp:"Originals One uses Type C to USB (older style), while the Originals Duo uses the newer Type C to Type C cable."},
        {q:"What is the name of the limited edition color available on the IQOS Originals Duo?",opts:["Royal Purple","Iridescent Purple","Digital Violet","Lavender"],ans:1,exp:"The Originals Duo has a Limited Edition Iridescent Purple colorway, in addition to Silver, Slate, Scarlet, and Turquoise."},
        {q:"Does the IQOS Originals One have Bluetooth connectivity?",opts:["Yes","No"],ans:1,exp:"No — the Originals One does NOT have Bluetooth. The Originals Duo does have Bluetooth."},
        {q:"⚠️ TRICKY: How many CONSECUTIVE uses can the IQOS Originals One holder support?",opts:["1 use","2 uses","3 consecutive uses","10 uses"],ans:2,exp:"TRICKY — The Originals One holder gives 20 total uses but only 3 CONSECUTIVE uses before needing a break to recharge. Don't confuse this with total capacity.",tricky:true},
        {q:"How many buttons does the IQOS 2.4+ have?",opts:["1","2","3","4"],ans:2,exp:"The IQOS 2.4+ has 3 buttons: Power Button, Latch Button, and Bluetooth Button — unlike all later models which have just 1 button."},
        {q:"What type of light indicator does the IQOS 2.4+ use, different from all other IQOS models?",opts:["OLED display","Day Light LED","Neon indicator","Standard LED"],ans:1,exp:"The IQOS 2.4+ uses a Day Light LED — all later models use a standard LED."},
        {q:"What cleaning tool is used with the IQOS 2.4+?",opts:["Silicon Brush & Cleaning Sticks","Dual Silicon Brush","Egg Brush","Cotton swab"],ans:2,exp:"The IQOS 2.4+ uses a unique Egg Brush for cleaning. All later models use Silicon Brush & Cleaning Sticks (or nothing for ILUMA)."},
        {q:"⚠️ TRICKY: What is the operating temperature range of the IQOS 2.4+?",opts:["0–40°C","0–50°C","10–40°C","5–45°C"],ans:2,exp:"TRICKY — The IQOS 2.4+ has a minimum operating temperature of 10°C, while all newer models (IQOS 3 and onwards) operate from 0°C.",tricky:true},
        {q:"Which legacy IQOS device allows 10 consecutive uses from the holder (without a pocket charger)?",opts:["IQOS 2.4+","IQOS 3","IQOS Multi","IQOS 3.1 DUO"],ans:2,exp:"The IQOS Multi is the one with 10 consecutive uses from a single charge — it doesn't have a separate pocket charger."},
        {q:"What charger connection type does the IQOS 2.4+ use?",opts:["Type C","Type A USB","Micro USB","Lightning"],ans:2,exp:"The IQOS 2.4+ uses Micro USB — all newer IQOS models use Type C."},
        {q:"Which was the FIRST IQOS device to introduce NFC connectivity?",opts:["IQOS 2.4+","IQOS 3","IQOS Multi","IQOS 3.1 DUO"],ans:1,exp:"The IQOS 3 was the first to introduce NFC. The 2.4+ had no NFC. IQOS Multi and 3.1 DUO also have NFC."},
        {q:"What does GDPR stand for?",opts:["General Digital Protection Regulation","General Data Privacy Rules","General Data Protection Regulation","Global Data Protection Rights"],ans:2,exp:"GDPR = General Data Protection Regulation — the EU framework governing how personal data is handled."},
        {q:"What does DSR stand for in the context of GDPR?",opts:["Data Security Record","Data Subject Request","Digital Safety Regulation","Data System Report"],ans:1,exp:"DSR = Data Subject Request — the formal process by which a customer exercises their GDPR rights."},
        {q:"Within how many hours must a Data Correction request be responded to?",opts:["24 hours","48 hours","72 hours","96 hours"],ans:2,exp:"Data Correction, Don't Contact requests, and Info of Data must all be handled within 72 hours."},
        {q:"⚠️ TRICKY: Which of the following scenarios results in data DELETION (not retention)?",opts:["Customer wants a copy of their data","Customer has stopped using nicotine","Customer corrected their address","Customer asked for info about their data"],ans:1,exp:"TRICKY — A customer who has stopped using nicotine is a Data Erasure case that leads to DELETION. The others are handled but data is kept.",tricky:true},
        {q:"What is the maximum response time for a 'Copy of Data' request under GDPR?",opts:["72 hours","3 to 30 days","24 hours","7 days"],ans:1,exp:"Under GDPR, a 'Copy of Data' (data access request) must be responded to without undue delay, but the maximum timeframe is 3 to 30 days depending on complexity. The standard expectation is 30 days max, with possible extension."},
        {q:"⚠️ TRICKY: The IQOS ILUMA i comes in how many colors?",opts:["4","5","6","3"],ans:1,exp:"TRICKY — The ILUMA i comes in 5 colors: Breeze Blue, Midnight Black, Vivid Terracotta, Leaf Green, and Digital Violet.",tricky:true},
        {q:"Which of the following correctly lists the IQOS Originals Duo pocket charger charge time?",opts:["90 minutes","120 minutes","135 minutes","75 minutes"],ans:1,exp:"The Originals Duo pocket charger takes 120 minutes. The Originals One also takes 90 minutes (same as ILUMA One)."}
    ];

    // Shuffle options for each question and store shuffled version
    function shuffleOptions(question) {
        const originalOpts = [...question.opts];
        const originalAnsIdx = question.ans;
        const correctAnswerText = originalOpts[originalAnsIdx];
        // create array of indices
        let indices = [0,1,2,3];
        for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        const newOpts = indices.map(i => originalOpts[i]);
        const newAnsIdx = newOpts.findIndex(opt => opt === correctAnswerText);
        return {
            q: question.q,
            opts: newOpts,
            ans: newAnsIdx,
            exp: question.exp,
            tricky: question.tricky || false
        };
    }

    // Build final questions (each with shuffled options)
    let questions = rawQuestions.map(q => shuffleOptions(q));
    
    // State
    let currentIdx = 0;
    let userSelections = new Array(50).fill(-1);
    let totalScore = 0;
    const trickyIndices = questions.map((q, idx) => q.tricky ? idx : -1).filter(i => i !== -1);
    
    const dynamicDiv = document.getElementById('dynamicContent');
    const progFill = document.getElementById('progFill');
    const qcDisplay = document.getElementById('qcDisplay');
    const scoreDisplaySpan = document.getElementById('scoreDisplay');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const quizInner = document.getElementById('quizInner');
    const finalScreenDiv = document.getElementById('finalScreen');
    const restartMainBtn = document.getElementById('restartQuizBtn');
    const reviewFinalBtn = document.getElementById('reviewMistakesBtnFinal');
    const modal = document.getElementById('reviewModal');
    const mistakeListDiv = document.getElementById('mistakesList');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalCloseFooter = document.getElementById('modalCloseFooter');

    function renderCurrent() {
        const q = questions[currentIdx];
        const percent = (currentIdx / 50) * 100;
        progFill.style.width = `${percent}%`;
        qcDisplay.textContent = `Question ${currentIdx + 1} of 50`;
        scoreDisplaySpan.textContent = `⭐ Score: ${totalScore}`;
        
        const qLabelHtml = `<div class="q-header"><span class="q-label">QUESTION ${currentIdx+1}</span>${q.tricky ? '<span class="tricky-badge">⚠️ TRICKY</span>' : ''}</div>`;
        const questionHtml = `<div class="question-text">${q.q}</div>`;
        let optionsHtml = `<div class="options-grid">`;
        q.opts.forEach((opt, idx) => {
            const letter = String.fromCharCode(65+idx);
            const isSelected = (userSelections[currentIdx] === idx);
            const isCorrectAnswer = (idx === q.ans);
            let extraClass = '';
            let disabledAttr = '';
            let onclickAttr = `onclick="selectOption(${idx})"`;
            if (userSelections[currentIdx] !== -1) {
                disabledAttr = 'disabled';
                onclickAttr = '';
                if (isCorrectAnswer) extraClass = 'option-correct';
                else if (isSelected) extraClass = 'option-wrong';
            }
            optionsHtml += `<button class="option-btn ${extraClass}" ${disabledAttr} ${onclickAttr} style="display: flex;"><span class="option-prefix">${letter}</span><span>${opt}</span></button>`;
        });
        optionsHtml += `</div>`;
        
        let explanationHtml = '';
        if (userSelections[currentIdx] !== -1) {
            const isAnsCorrect = (userSelections[currentIdx] === q.ans);
            explanationHtml = `<div class="explanation-card ${isAnsCorrect ? 'explanation-correct' : 'explanation-wrong'}">
                ${isAnsCorrect ? '✓ Correct!' : '✗ Wrong'} — ${q.exp}
            </div>`;
        }
        
        dynamicDiv.innerHTML = qLabelHtml + questionHtml + optionsHtml + explanationHtml;
        nextBtn.disabled = (userSelections[currentIdx] === -1);
        nextBtn.textContent = (currentIdx === 49) ? 'Finish' : 'Next →';
        prevBtn.style.visibility = currentIdx > 0 ? 'visible' : 'hidden';
    }
    
    window.selectOption = function(optIndex) {
        if (userSelections[currentIdx] !== -1) return;
        userSelections[currentIdx] = optIndex;
        const q = questions[currentIdx];
        if (optIndex === q.ans) totalScore++;
        renderCurrent();
    };
    
    function nextQuestion() {
        if (currentIdx === 49) {
            finishQuiz();
            return;
        }
        if (userSelections[currentIdx] === -1) return;
        currentIdx++;
        renderCurrent();
    }
    
    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            renderCurrent();
        }
    }
    
    function finishQuiz() {
        quizInner.style.display = 'none';
        finalScreenDiv.style.display = 'block';
        const finalScore = totalScore;
        const percent = Math.round((finalScore/50)*100);
        document.getElementById('finalScoreSpan').innerHTML = `${finalScore}/50`;
        const passThreshold = 85;
        const isPass = percent >= passThreshold;
        const passMsg = isPass ? `✅ PASSED! ${percent}% (≥85%)` : `❌ NOT PASSED • ${percent}% (need 85%)`;
        document.getElementById('passMessage').innerHTML = passMsg;
        document.getElementById('finalCorrect').innerText = finalScore;
        document.getElementById('finalWrong').innerText = 50 - finalScore;
        const trickyCorrect = trickyIndices.filter(i => userSelections[i] === questions[i].ans).length;
        document.getElementById('finalTricky').innerText = `${trickyCorrect}/${trickyIndices.length}`;
    }
    
    function restartQuiz() {
        // reshuffle options for fairness on restart
        questions = rawQuestions.map(q => shuffleOptions(q));
        userSelections.fill(-1);
        totalScore = 0;
        currentIdx = 0;
        quizInner.style.display = 'block';
        finalScreenDiv.style.display = 'none';
        renderCurrent();
    }
    
    function showMistakes() {
        const mistakes = [];
        for (let i=0; i<questions.length; i++) {
            const selected = userSelections[i];
            if (selected === -1) continue;
            if (selected !== questions[i].ans) {
                const correctIdx = questions[i].ans;
                const correctLetter = String.fromCharCode(65+correctIdx);
                const correctText = questions[i].opts[correctIdx];
                const userLetter = String.fromCharCode(65+selected);
                const userText = questions[i].opts[selected];
                mistakes.push({
                    num: i+1,
                    text: questions[i].q,
                    user: `${userLetter}. ${userText}`,
                    correct: `${correctLetter}. ${correctText}`,
                    explanation: questions[i].exp,
                    tricky: questions[i].tricky
                });
            }
        }
        if (mistakes.length === 0) {
            mistakeListDiv.innerHTML = '<div style="padding: 1rem; text-align: center;">🎉 Flawless! No mistakes — you are a pro 🎉</div>';
        } else {
            mistakeListDiv.innerHTML = mistakes.map(m => `
                <div class="mistake-entry">
                    <div style="font-weight:700;">❓ Q${m.num}: ${m.text} ${m.tricky ? '⚠️ tricky' : ''}</div>
                    <div style="margin-top: 6px;"><strong>Your answer:</strong> ${m.user}</div>
                    <div><strong>✅ Correct:</strong> ${m.correct}</div>
                    <div style="margin-top: 5px; font-size:0.8rem;">📘 ${m.explanation}</div>
                </div>
            `).join('');
        }
        modal.style.display = 'flex';
    }
    
    function closeModalFunc() {
        modal.style.display = 'none';
    }
    
    prevBtn.onclick = prevQuestion;
    nextBtn.onclick = nextQuestion;
    restartMainBtn.onclick = restartQuiz;
    reviewFinalBtn.onclick = showMistakes;
    closeModalBtn.onclick = closeModalFunc;
    modalCloseFooter.onclick = closeModalFunc;
    window.onclick = (e) => { if (e.target === modal) closeModalFunc(); };
    
    renderCurrent();
</script>
</body>
</html>
