<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQOS PMI Training Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07070f;
    --bg2: #0e0e1a;
    --bg3: #14142a;
    --cyan: #00e8f5;
    --cyan-dim: rgba(0,232,245,0.15);
    --gold: #f0a800;
    --gold-dim: rgba(240,168,0,0.15);
    --easy: #22c55e;
    --medium: #f59e0b;
    --hard: #ef4444;
    --white: #e8e8f5;
    --muted: #6b6b8a;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,232,245,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 90%, rgba(240,168,0,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* ─── HOME SCREEN ─── */
  #home {
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 0;
  }

  .logo-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--cyan-dim);
    border: 1px solid rgba(0,232,245,0.25);
    border-radius: 100px;
    padding: 8px 18px;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
  }
  .logo-badge span { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--cyan); font-weight: 600; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: pulse 1.5s ease infinite; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

  .home-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(42px, 8vw, 72px);
    font-weight: 800;
    text-align: center;
    line-height: 1.05;
    animation: fadeDown 0.6s 0.1s ease both;
    margin-bottom: 8px;
  }
  .home-title .accent { color: var(--cyan); }
  .home-title .accent2 { color: var(--gold); }

  .home-sub {
    color: var(--muted);
    text-align: center;
    font-size: 16px;
    margin-bottom: 48px;
    font-weight: 300;
    animation: fadeDown 0.6s 0.2s ease both;
  }

  .level-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    width: 100%;
    max-width: 680px;
    margin-bottom: 32px;
    animation: fadeDown 0.6s 0.3s ease both;
  }

  .level-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .level-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .level-card:hover { transform: translateY(-2px); }
  .level-card.selected { border-width: 2px; }

  .level-card[data-level="all"] { border-color: rgba(0,232,245,0.4); }
  .level-card[data-level="all"].selected { background: var(--cyan-dim); border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,232,245,0.15); }
  .level-card[data-level="easy"] { border-color: rgba(34,197,94,0.3); }
  .level-card[data-level="easy"].selected { background: rgba(34,197,94,0.1); border-color: var(--easy); box-shadow: 0 0 20px rgba(34,197,94,0.15); }
  .level-card[data-level="medium"] { border-color: rgba(245,158,11,0.3); }
  .level-card[data-level="medium"].selected { background: rgba(245,158,11,0.1); border-color: var(--medium); box-shadow: 0 0 20px rgba(245,158,11,0.15); }
  .level-card[data-level="hard"] { border-color: rgba(239,68,68,0.3); }
  .level-card[data-level="hard"].selected { background: rgba(239,68,68,0.1); border-color: var(--hard); box-shadow: 0 0 20px rgba(239,68,68,0.15); }

  .level-icon { font-size: 28px; margin-bottom: 8px; }
  .level-label { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .level-count { font-size: 13px; color: var(--muted); }
  .level-card[data-level="all"] .level-label { color: var(--cyan); }
  .level-card[data-level="easy"] .level-label { color: var(--easy); }
  .level-card[data-level="medium"] .level-label { color: var(--medium); }
  .level-card[data-level="hard"] .level-label { color: var(--hard); }

  .start-btn {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: var(--cyan);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 18px 56px;
    cursor: pointer;
    transition: all 0.2s ease;
    animation: fadeDown 0.6s 0.4s ease both;
    position: relative;
    overflow: hidden;
  }
  .start-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,232,245,0.4); }
  .start-btn:active { transform: translateY(0); }

  .q-count-display {
    margin-top: 16px;
    color: var(--muted);
    font-size: 13px;
    animation: fadeDown 0.6s 0.5s ease both;
  }

  /* ─── QUIZ SCREEN ─── */
  #quiz {
    padding: 0;
    align-items: stretch;
  }

  .quiz-header {
    padding: 20px 24px 0;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  .quiz-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .q-number { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--muted); }
  .q-level-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
  }
  .q-level-badge.easy { background: rgba(34,197,94,0.12); color: var(--easy); }
  .q-level-badge.medium { background: rgba(245,158,11,0.12); color: var(--medium); }
  .q-level-badge.hard { background: rgba(239,68,68,0.12); color: var(--hard); }

  .q-score-display { font-family: 'Syne', sans-serif; font-size: 14px; color: var(--cyan); font-weight: 600; }

  .progress-bar-bg {
    height: 6px;
    background: var(--bg3);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--gold));
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .quiz-body {
    flex: 1;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    animation: slideIn 0.35s ease;
  }

  @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .q-type-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: clamp(17px, 3vw, 21px);
    font-weight: 600;
    line-height: 1.45;
    color: var(--white);
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.35s 0.1s ease both;
  }

  .option-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
    transition: all 0.18s ease;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover:not(:disabled) {
    border-color: rgba(0,232,245,0.4);
    background: rgba(0,232,245,0.05);
    transform: translateX(3px);
  }

  .option-letter {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.18s;
  }

  .option-btn.correct {
    border-color: var(--easy);
    background: rgba(34,197,94,0.1);
  }
  .option-btn.correct .option-letter {
    background: var(--easy);
    color: var(--bg);
  }
  .option-btn.wrong {
    border-color: var(--hard);
    background: rgba(239,68,68,0.1);
  }
  .option-btn.wrong .option-letter {
    background: var(--hard);
    color: var(--white);
  }
  .option-btn.reveal-correct {
    border-color: rgba(34,197,94,0.5);
    background: rgba(34,197,94,0.05);
  }
  .option-btn.reveal-correct .option-letter {
    background: rgba(34,197,94,0.3);
    color: var(--easy);
  }
  .option-btn:disabled { cursor: default; }

  .tf-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    animation: fadeUp 0.35s 0.1s ease both;
  }

  .tf-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: all 0.18s ease;
    color: var(--white);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }
  .tf-btn .tf-icon { font-size: 28px; }
  .tf-btn:hover:not(:disabled) { transform: translateY(-3px); }
  .tf-btn.tf-true:hover:not(:disabled) { border-color: var(--easy); background: rgba(34,197,94,0.08); }
  .tf-btn.tf-false:hover:not(:disabled) { border-color: var(--hard); background: rgba(239,68,68,0.08); }
  .tf-btn.correct { border-color: var(--easy); background: rgba(34,197,94,0.12); color: var(--easy); }
  .tf-btn.wrong { border-color: var(--hard); background: rgba(239,68,68,0.12); color: var(--hard); }
  .tf-btn.reveal-correct { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.06); color: var(--easy); }
  .tf-btn:disabled { cursor: default; }

  .explanation-box {
    background: rgba(0,232,245,0.06);
    border: 1px solid rgba(0,232,245,0.2);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    color: rgba(232,232,245,0.8);
    line-height: 1.6;
    animation: fadeUp 0.3s ease both;
  }
  .explanation-box strong { color: var(--cyan); }

  .next-btn {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    background: transparent;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    border-radius: 12px;
    padding: 15px 32px;
    cursor: pointer;
    transition: all 0.2s;
    align-self: flex-end;
    animation: fadeUp 0.3s ease both;
  }
  .next-btn:hover { background: var(--cyan); color: var(--bg); transform: translateX(4px); }

  /* ─── RESULTS SCREEN ─── */
  #results {
    align-items: center;
    padding: 40px 20px;
    gap: 24px;
  }

  .results-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    animation: fadeDown 0.5s ease both;
  }

  .score-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 4px solid var(--bg3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: fadeDown 0.5s 0.1s ease both;
  }
  .score-circle svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }
  .score-number { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; color: var(--white); line-height: 1; }
  .score-denom { font-size: 14px; color: var(--muted); }
  .score-pct { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; }

  .score-grade {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    animation: fadeDown 0.5s 0.2s ease both;
    text-align: center;
  }

  .breakdown-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 500px;
    animation: fadeUp 0.5s 0.3s ease both;
  }

  .breakdown-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }
  .breakdown-card .bd-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .breakdown-card .bd-score { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .breakdown-card .bd-total { font-size: 12px; color: var(--muted); }
  .breakdown-card.easy .bd-label { color: var(--easy); }
  .breakdown-card.easy .bd-score { color: var(--easy); }
  .breakdown-card.medium .bd-label { color: var(--medium); }
  .breakdown-card.medium .bd-score { color: var(--medium); }
  .breakdown-card.hard .bd-label { color: var(--hard); }
  .breakdown-card.hard .bd-score { color: var(--hard); }

  .review-section {
    width: 100%;
    max-width: 700px;
    animation: fadeUp 0.5s 0.4s ease both;
  }
  .review-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .review-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 10px;
  }
  .review-item .ri-q { font-size: 14px; font-weight: 500; margin-bottom: 8px; line-height: 1.5; }
  .ri-answers { display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
  .ri-your { color: var(--hard); }
  .ri-correct { color: var(--easy); }
  .ri-exp { color: var(--muted); margin-top: 6px; font-size: 12px; }

  .results-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.5s 0.5s ease both;
  }

  .btn-restart {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    background: var(--cyan);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 15px 32px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,232,245,0.3); }

  .btn-home {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    background: transparent;
    color: var(--muted);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 15px 32px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-home:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }

  @media (max-width: 480px) {
    .level-grid { grid-template-columns: 1fr 1fr; }
    .breakdown-grid { grid-template-columns: repeat(3, 1fr); }
    .tf-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="logo-badge">
    <div class="logo-dot"></div>
    <span>IQOS PMI — Wave 36</span>
  </div>
  <h1 class="home-title">MASTER<br>YOUR <span class="accent">IQOS</span><br><span class="accent2">KNOWLEDGE</span></h1>
  <p class="home-sub">150 questions across 3 difficulty levels</p>

  <div class="level-grid">
    <div class="level-card selected" data-level="all" onclick="selectLevel('all')">
      <div class="level-icon">⚡</div>
      <div class="level-label">All Levels</div>
      <div class="level-count">150 questions</div>
    </div>
    <div class="level-card" data-level="easy" onclick="selectLevel('easy')">
      <div class="level-icon">🟢</div>
      <div class="level-label">Easy</div>
      <div class="level-count">50 questions</div>
    </div>
    <div class="level-card" data-level="medium" onclick="selectLevel('medium')">
      <div class="level-icon">🟡</div>
      <div class="level-label">Medium</div>
      <div class="level-count">50 questions</div>
    </div>
    <div class="level-card" data-level="hard" onclick="selectLevel('hard')">
      <div class="level-icon">🔴</div>
      <div class="level-label">Hard</div>
      <div class="level-count">50 questions</div>
    </div>
  </div>

  <button class="start-btn" onclick="startQuiz()">Start Quiz →</button>
  <p class="q-count-display" id="q-count-display">150 questions selected</p>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <div class="quiz-header">
    <div class="quiz-meta">
      <span class="q-number" id="q-number">Question 1 / 150</span>
      <span class="q-level-badge easy" id="q-level-badge">Easy</span>
      <span class="q-score-display" id="q-score-display">0 / 0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="quiz-body" id="quiz-body">
    <!-- dynamically filled -->
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="results">
  <p class="results-title">Quiz Complete</p>

  <div class="score-circle" id="score-circle">
    <svg viewBox="0 0 160 160" width="160" height="160">
      <circle cx="80" cy="80" r="72" fill="none" stroke="var(--bg3)" stroke-width="8"/>
      <circle cx="80" cy="80" r="72" fill="none" stroke="var(--cyan)" stroke-width="8"
        stroke-linecap="round" stroke-dasharray="452.4" stroke-dashoffset="452.4"
        id="score-arc" style="transition: stroke-dashoffset 1.2s ease"/>
    </svg>
    <div class="score-number" id="score-num">0</div>
    <div class="score-denom" id="score-denom">/ 0</div>
  </div>

  <div class="score-grade" id="score-grade">—</div>

  <div class="breakdown-grid">
    <div class="breakdown-card easy">
      <div class="bd-label">Easy</div>
      <div class="bd-score" id="bd-easy">0</div>
      <div class="bd-total" id="bd-easy-t">/ 0</div>
    </div>
    <div class="breakdown-card medium">
      <div class="bd-label">Medium</div>
      <div class="bd-score" id="bd-med">0</div>
      <div class="bd-total" id="bd-med-t">/ 0</div>
    </div>
    <div class="breakdown-card hard">
      <div class="bd-label">Hard</div>
      <div class="bd-score" id="bd-hard">0</div>
      <div class="bd-total" id="bd-hard-t">/ 0</div>
    </div>
  </div>

  <div class="review-section" id="review-section"></div>

  <div class="results-actions">
    <button class="btn-restart" onclick="restartSame()">Retry Same Level</button>
    <button class="btn-home" onclick="goHome()">← Back to Home</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
// ── EASY (1-50) ──
{id:1,l:'easy',t:'mcq',q:'What does HNB stand for?',o:['Heat Not Burn','High Nicotine Base','Hybrid Nicotine Battery','Heated Nicotine Base'],a:0,e:'HNB = Heat Not Burn — the core technology behind IQOS.'},
{id:2,l:'easy',t:'mcq',q:'What does NCA stand for?',o:['Nicotine Controlled Alternative','Non-Combusted Alternative','Nicotine Combustion Agent','Non-Chemical Additive'],a:1,e:'NCA = Non-Combusted Alternative.'},
{id:3,l:'easy',t:'mcq',q:'At what temperature does IQOS heat tobacco?',o:['600°C','800°C','350°C','450°C'],a:2,e:'IQOS heats at 350°C — far below the 800°C of cigarettes.'},
{id:4,l:'easy',t:'mcq',q:'At what temperature do regular cigarettes burn?',o:['350°C','600°C','1000°C','800°C'],a:3,e:'Cigarettes burn at 800°C. IQOS only heats at 350°C.'},

// ─── STATE ───
let selectedLevel = 'all';
let activeQuestions = [];
let currentIdx = 0;
let score = 0;
let answered = false;
let results = { easy:{c:0,t:0}, medium:{c:0,t:0}, hard:{c:0,t:0} };
let wrongAnswers = [];

// ─── NAVIGATION ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectLevel(lvl) {
  selectedLevel = lvl;
  document.querySelectorAll('.level-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`[data-level="${lvl}"]`).classList.add('selected');
  const counts = { all:150, easy:50, medium:50, hard:50 };
  document.getElementById('q-count-display').textContent = `${counts[lvl]} questions selected`;
}

function startQuiz() {
  if (selectedLevel === 'all') {
    activeQuestions = shuffle([...ALL_QUESTIONS]);
  } else {
    activeQuestions = shuffle(ALL_QUESTIONS.filter(q => q.l === selectedLevel));
  }
  currentIdx = 0;
  score = 0;
  answered = false;
  results = { easy:{c:0,t:0}, medium:{c:0,t:0}, hard:{c:0,t:0} };
  wrongAnswers = [];
  showScreen('quiz');
  renderQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ─── RENDER QUESTION ───
function renderQuestion() {
  answered = false;
  const q = activeQuestions[currentIdx];
  const total = activeQuestions.length;

  // Header
  document.getElementById('q-number').textContent = `Question ${currentIdx + 1} / ${total}`;
  const badge = document.getElementById('q-level-badge');
  badge.textContent = q.l.charAt(0).toUpperCase() + q.l.slice(1);
  badge.className = 'q-level-badge ' + q.l;
  document.getElementById('q-score-display').textContent = `${score} / ${currentIdx}`;
  document.getElementById('progress-fill').style.width = `${(currentIdx / total) * 100}%`;

  const body = document.getElementById('quiz-body');
  const typeLabel = q.t === 'tf' ? '⊙ TRUE / FALSE' : '◈ MULTIPLE CHOICE';
  const optionsHTML = q.t === 'tf' ? renderTF() : renderMCQ(q.o);

  body.innerHTML = `
    <div class="question-card">
      <div class="q-type-label">${typeLabel}</div>
      <div class="question-text">${q.q}</div>
    </div>
    ${optionsHTML}
    <div id="explanation-box" style="display:none"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuestion()">
      ${currentIdx + 1 >= total ? 'See Results →' : 'Next →'}
    </button>
  `;
}

function renderMCQ(opts) {
  const letters = ['A','B','C','D'];
  return `<div class="options-grid">${opts.map((o,i) =>
    `<button class="option-btn" onclick="selectMCQ(${i})" id="opt-${i}">
      <span class="option-letter">${letters[i]}</span>
      <span>${o}</span>
    </button>`
  ).join('')}</div>`;
}

function renderTF() {
  return `<div class="tf-grid">
    <button class="tf-btn tf-true" onclick="selectTF(0)" id="opt-0">
      <span class="tf-icon">✓</span><span>True</span>
    </button>
    <button class="tf-btn tf-false" onclick="selectTF(1)" id="opt-1">
      <span class="tf-icon">✗</span><span>False</span>
    </button>
  </div>`;
}

// ─── ANSWER HANDLERS ───
function selectMCQ(idx) {
  if (answered) return;
  answered = true;
  const q = activeQuestions[currentIdx];
  const correct = q.a;

  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  if (idx === correct) {
    document.getElementById(`opt-${idx}`).classList.add('correct');
    registerCorrect(q);
  } else {
    document.getElementById(`opt-${idx}`).classList.add('wrong');
    document.getElementById(`opt-${correct}`).classList.add('reveal-correct');
    registerWrong(q, q.o[idx]);
  }

  showExplanation(q.e);
}

function selectTF(idx) {
  if (answered) return;
  answered = true;
  const q = activeQuestions[currentIdx];
  const correct = q.a;

  document.querySelectorAll('.tf-btn').forEach(b => b.disabled = true);

  if (idx === correct) {
    document.getElementById(`opt-${idx}`).classList.add('correct');
    registerCorrect(q);
  } else {
    document.getElementById(`opt-${idx}`).classList.add('wrong');
    document.getElementById(`opt-${correct}`).classList.add('reveal-correct');
    registerWrong(q, idx === 0 ? 'True' : 'False');
  }

  showExplanation(q.e);
}

function registerCorrect(q) {
  score++;
  results[q.l].c++;
  results[q.l].t++;
}

function registerWrong(q, yourAnswer) {
  results[q.l].t++;
  const correctAns = q.t === 'tf' ? (q.a === 0 ? 'True' : 'False') : q.o[q.a];
  wrongAnswers.push({ q: q.q, yours: yourAnswer, correct: correctAns, exp: q.e });
}

function showExplanation(text) {
  const box = document.getElementById('explanation-box');
  box.innerHTML = `<strong>💡 </strong>${text}`;
  box.style.display = 'block';
  document.getElementById('next-btn').style.display = 'flex';
  document.getElementById('next-btn').style.justifyContent = 'flex-end';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= activeQuestions.length) {
    showResults();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ─── RESULTS ───
function showResults() {
  showScreen('results');
  const total = activeQuestions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('score-num').textContent = score;
  document.getElementById('score-denom').textContent = `/ ${total}`;

  // Animate arc
  const circumference = 2 * Math.PI * 72;
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => {
    document.getElementById('score-arc').style.strokeDashoffset = offset;
    const arc = document.getElementById('score-arc');
    if (pct >= 80) arc.style.stroke = 'var(--easy)';
    else if (pct >= 60) arc.style.stroke = 'var(--medium)';
    else arc.style.stroke = 'var(--hard)';
  }, 100);

  // Grade
  let grade, color;
  if (pct >= 90) { grade = '🏆 Certified Expert'; color = 'var(--easy)'; }
  else if (pct >= 80) { grade = '⭐ Almost There'; color = 'var(--cyan)'; }
  else if (pct >= 70) { grade = '📈 Keep Grinding'; color = 'var(--medium)'; }
  else if (pct >= 60) { grade = '⚡ Need More Study'; color = 'var(--gold)'; }
  else { grade = '📚 Study Mode On'; color = 'var(--hard)'; }

  const gradeEl = document.getElementById('score-grade');
  gradeEl.textContent = `${pct}% — ${grade}`;
  gradeEl.style.color = color;

  // Breakdown
  const lvls = ['easy','medium','hard'];
  const ids = ['easy','med','hard'];
  lvls.forEach((l, i) => {
    const r = results[l];
    document.getElementById(`bd-${ids[i]}`).textContent = r.c;
    document.getElementById(`bd-${ids[i]}-t`).textContent = `/ ${r.t}`;
  });

  // Wrong answers review
  const rev = document.getElementById('review-section');
  if (wrongAnswers.length === 0) {
    rev.innerHTML = `<div style="text-align:center;color:var(--easy);font-family:'Syne',sans-serif;font-size:18px;font-weight:700;padding:20px">🎯 Perfect Score! No wrong answers!</div>`;
  } else {
    rev.innerHTML = `<div class="review-title">Wrong Answers Review (${wrongAnswers.length})</div>` +
      wrongAnswers.map(w => `
        <div class="review-item">
          <div class="ri-q">❓ ${w.q}</div>
          <div class="ri-answers">
            <div class="ri-your">✗ Your answer: ${w.yours}</div>
            <div class="ri-correct">✓ Correct: ${w.correct}</div>
            <div class="ri-exp">💡 ${w.exp}</div>
          </div>
        </div>
      `).join('');
  }
}

function restartSame() {
  startQuiz();
}

function goHome() {
  showScreen('home');
}
</script>
